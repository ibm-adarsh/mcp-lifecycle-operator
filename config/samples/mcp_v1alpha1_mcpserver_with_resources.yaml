apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: mcpserver-with-resources
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: docker.io/library/nginx:latest
  config:
    port: 8080
  runtime:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
